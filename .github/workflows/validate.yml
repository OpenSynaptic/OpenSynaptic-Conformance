name: Validate Conformance Repository

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OpenSynaptic-Conformance

    steps:
      - name: Checkout conformance repository
        uses: actions/checkout@v6
        with:
          path: OpenSynaptic-Conformance

      - name: Checkout OpenSynaptic
        uses: actions/checkout@v6
        with:
          repository: OpenSynaptic/OpenSynaptic
          path: OpenSynaptic
          fetch-depth: 1

      - name: Checkout OSynaptic-FX
        uses: actions/checkout@v6
        with:
          repository: OpenSynaptic/OSynaptic-FX
          path: OSynaptic-FX
          fetch-depth: 1

      - name: Checkout OSynaptic-RX
        uses: actions/checkout@v6
        with:
          repository: OpenSynaptic/OSynaptic-RX
          path: OSynaptic-RX
          fetch-depth: 1

      - name: Checkout OSynaptic-TX
        uses: actions/checkout@v6
        with:
          repository: OpenSynaptic/OSynaptic-TX
          path: OSynaptic-TX
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Validate repository assets
        run: python runners/python/conformance_runner.py validate-assets --write-report reports/generated/assets-validation.report.json

      - name: Verify mock adapter against L1 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l1-wire-compatible/l1-wire-compatible.profile.v1.json --write-report reports/generated/mock-adapter.l1.report.json

      - name: Verify mock adapter against L3 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l3-fusion-certified/l3-fusion-certified.profile.v1.json --write-report reports/generated/mock-adapter.l3.report.json

      - name: Smoke real implementation adapter - OpenSynaptic Core
        id: smoke_core
        run: python runners/python/real_adapter_smoke.py --target opensynaptic-core

      - name: Smoke real implementation adapter - OSynaptic-FX
        id: smoke_fx
        if: always()
        run: python runners/python/real_adapter_smoke.py --target osynaptic-fx

      - name: Smoke real implementation adapter - OSynaptic-RX
        id: smoke_rx
        if: always()
        run: python runners/python/real_adapter_smoke.py --target osynaptic-rx

      - name: Smoke real implementation adapter - OSynaptic-TX
        id: smoke_tx
        if: always()
        run: python runners/python/real_adapter_smoke.py --target osynaptic-tx

      - name: Run repository CLI tests
        if: always()
        run: python -m unittest discover -s tests/python -p "test_*.py" -v

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-reports
          path: OpenSynaptic-Conformance/reports/generated/*.json
          if-no-files-found: warn