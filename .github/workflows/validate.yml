name: Validate Conformance Repository

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: OpenSynaptic-Conformance

    steps:
      - name: Checkout conformance repository
        uses: actions/checkout@v6
        with:
          path: OpenSynaptic-Conformance

      - name: Load locked sibling refs
        id: sibling_refs
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path("config/sibling-refs.json").read_text(encoding="utf-8"))
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              for name, spec in config["repositories"].items():
                  print(f"{name}_repository={spec['repository']}", file=handle)
                  print(f"{name}_ref={spec['ref']}", file=handle)
          PY

      - name: Checkout OpenSynaptic
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.sibling_refs.outputs.opensynaptic_repository }}
          ref: ${{ steps.sibling_refs.outputs.opensynaptic_ref }}
          path: OpenSynaptic
          fetch-depth: 1

      - name: Checkout OSynaptic-FX
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.sibling_refs.outputs.osynaptic_fx_repository }}
          ref: ${{ steps.sibling_refs.outputs.osynaptic_fx_ref }}
          path: OSynaptic-FX
          fetch-depth: 1

      - name: Checkout OSynaptic-RX
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.sibling_refs.outputs.osynaptic_rx_repository }}
          ref: ${{ steps.sibling_refs.outputs.osynaptic_rx_ref }}
          path: OSynaptic-RX
          fetch-depth: 1

      - name: Checkout OSynaptic-TX
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.sibling_refs.outputs.osynaptic_tx_repository }}
          ref: ${{ steps.sibling_refs.outputs.osynaptic_tx_ref }}
          path: OSynaptic-TX
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Validate repository assets
        run: python runners/python/conformance_runner.py validate-assets --write-report reports/generated/assets-validation.report.json

      - name: Verify mock adapter against L1 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l1-wire-compatible/l1-wire-compatible.profile.v1.json --write-report reports/generated/mock-adapter.l1.report.json

      - name: Verify mock adapter against L2 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l2-protocol-conformant/l2-protocol-conformant.profile.v1.json --write-report reports/generated/mock-adapter.l2.report.json

      - name: Verify mock adapter against L3 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l3-fusion-certified/l3-fusion-certified.profile.v1.json --write-report reports/generated/mock-adapter.l3.report.json

      - name: Verify mock adapter against L4 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l4-security-validated/l4-security-validated.profile.v1.json --write-report reports/generated/mock-adapter.l4.report.json

      - name: Verify mock adapter against L5 profile
        run: python runners/python/conformance_runner.py verify-adapter --adapter adapters/mock/manifest.v1.json --profile profiles/l5-full-ecosystem/l5-full-ecosystem.profile.v1.json --write-report reports/generated/mock-adapter.l5.report.json

      - name: Smoke real implementation adapter - OpenSynaptic Core
        id: smoke_core
        run: python runners/python/real_adapter_smoke.py --target opensynaptic-core

      - name: Smoke real implementation adapter - OSynaptic-FX
        id: smoke_fx
        if: always()
        run: python runners/python/real_adapter_smoke.py --target osynaptic-fx

      - name: Smoke real implementation adapter - OSynaptic-RX
        id: smoke_rx
        if: always()
        run: python runners/python/real_adapter_smoke.py --target osynaptic-rx

      - name: Smoke real implementation adapter - OSynaptic-TX
        id: smoke_tx
        if: always()
        run: python runners/python/real_adapter_smoke.py --target osynaptic-tx

      - name: Run repository CLI tests
        if: always()
        run: python -m unittest discover -s tests/python -p "test_*.py" -v

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-reports
          path: OpenSynaptic-Conformance/reports/generated/*.json
          if-no-files-found: warn